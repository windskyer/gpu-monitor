services:
  gpu-monitor:
    build: .
    image: gpu-monitor:latest
    container_name: gpu-monitor
    restart: unless-stopped

    # GPU 进程 PID 解析 + 宿主进程视图(NVML 返回的是宿主 PID)
    pid: host

    # 仅本机可访问,对外再经宿主 nginx 反代 + token
    ports:
      - "127.0.0.1:8800:8800"

    environment:
      # —— NVIDIA Container Toolkit:utility 能力会注入 libnvidia-ml.so.1(NVML)——
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: utility
      # —— gopsutil 读取宿主命名空间(变量名由 gopsutil 自身识别)——
      HOST_PROC: /host/proc
      HOST_SYS: /host/sys
      HOST_ETC: /host/etc
      TZ: Asia/Shanghai

    volumes:
      - /proc:/host/proc:ro                 # CPU/内存/网络/挂载信息
      - /sys:/host/sys:ro                   # hwmon 温度(k10temp 等)
      - /etc:/host/etc:ro
      - /:/host/root:ro,rslave              # 磁盘用量(配合 config 的 host.mount_prefix=/host/root)
      - ./config.yaml:/etc/gpu-monitor/config.yaml:ro

    # GPU 资源预留(等价于 docker run --gpus all)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [utility]
